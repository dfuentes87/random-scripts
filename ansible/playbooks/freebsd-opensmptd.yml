---
- name: Configure OpenSMTPD mail services inside a FreeBSD jail
  hosts: freebsd_mail_jails
  become: true
  vars:
    freebsd_opensmptd_domain: example.net
    freebsd_opensmptd_hostname: mail.example.net

    # These paths should exist inside the jail, commonly from a read-only
    # nullfs mount of the host or nginx jail Let's Encrypt directory.
    freebsd_opensmptd_cert_fullchain: /usr/local/etc/letsencrypt/live/mail.example.net/fullchain.pem
    freebsd_opensmptd_cert_privkey: /usr/local/etc/letsencrypt/live/mail.example.net/privkey.pem

    freebsd_opensmptd_redis_password: replace-with-a-random-redis-password

    # Written on the Ansible controller after DKIM key generation.
    freebsd_opensmptd_dkim_dns_output_path: "{{ playbook_dir }}/{{ freebsd_opensmptd_domain }}-dkim.txt"

    # Set this true if the package is unavailable or broken for this jail.
    freebsd_opensmptd_build_table_passwd: false

  roles:
    - role: ../roles/freebsd-opensmptd
