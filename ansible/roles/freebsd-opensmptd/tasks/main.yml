---
- name: Validate required deployment values
  ansible.builtin.assert:
    that:
      - freebsd_opensmptd_domain | length > 0
      - freebsd_opensmptd_hostname | length > 0
      - freebsd_opensmptd_redis_password | length > 0
      - freebsd_opensmptd_rspamd_redis_servers | length > 0
      - not freebsd_opensmptd_enable_clamav | bool or freebsd_opensmptd_clamav_rspamd_server | length > 0
    fail_msg: Set the mail domain, mail hostname, Redis password, Redis server list, and ClamAV server in the playbook.

- name: Install Redis
  ansible.builtin.package:
    name: redis
    state: present

- name: Install mail service packages
  ansible.builtin.package:
    name: "{{ freebsd_opensmptd_mail_packages }}"
    state: present

- name: Install OpenSMTPD passwd table package
  ansible.builtin.package:
    name: "{{ freebsd_opensmptd_table_passwd_package }}"
    state: present
  when:
    - freebsd_opensmptd_install_table_passwd_package | bool
    - not freebsd_opensmptd_build_table_passwd | bool

- name: Install table-passwd build dependencies
  ansible.builtin.package:
    name:
      - autoconf
      - automake
      - git
    state: present
  when: freebsd_opensmptd_build_table_passwd | bool

- name: Checkout table-passwd source
  ansible.builtin.git:
    repo: "{{ freebsd_opensmptd_table_passwd_repo }}"
    dest: "{{ freebsd_opensmptd_table_passwd_build_dir }}"
    version: HEAD
  when: freebsd_opensmptd_build_table_passwd | bool

- name: Bootstrap table-passwd
  ansible.builtin.command:
    cmd: sh bootstrap
    chdir: "{{ freebsd_opensmptd_table_passwd_build_dir }}"
    creates: "{{ freebsd_opensmptd_table_passwd_build_dir }}/configure"
  when: freebsd_opensmptd_build_table_passwd | bool

- name: Configure table-passwd
  ansible.builtin.command:
    cmd: ./configure
    chdir: "{{ freebsd_opensmptd_table_passwd_build_dir }}"
    creates: "{{ freebsd_opensmptd_table_passwd_build_dir }}/Makefile"
  when: freebsd_opensmptd_build_table_passwd | bool

- name: Build table-passwd
  ansible.builtin.command:
    cmd: make
    chdir: "{{ freebsd_opensmptd_table_passwd_build_dir }}"
    creates: "{{ freebsd_opensmptd_table_passwd_build_dir }}/table-passwd"
  when: freebsd_opensmptd_build_table_passwd | bool

- name: Install table-passwd
  ansible.builtin.command:
    cmd: make install
    chdir: "{{ freebsd_opensmptd_table_passwd_build_dir }}"
    creates: /usr/local/libexec/opensmtpd/table-passwd
  when: freebsd_opensmptd_build_table_passwd | bool

- name: Install ClamAV
  ansible.builtin.package:
    name: clamav
    state: present
  when: freebsd_opensmptd_enable_clamav | bool

- name: Configure Redis
  ansible.builtin.lineinfile:
    path: /usr/local/etc/redis.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    create: false
  loop:
    - regexp: '^\s*#?\s*requirepass\s+'
      line: "requirepass {{ freebsd_opensmptd_redis_password }}"
    - regexp: '^\s*#?\s*maxmemory\s+'
      line: "maxmemory {{ freebsd_opensmptd_redis_maxmemory }}"
    - regexp: '^\s*#?\s*maxmemory-policy\s+'
      line: "maxmemory-policy {{ freebsd_opensmptd_redis_maxmemory_policy }}"
    - regexp: '^\s*#?\s*bind\s+'
      line: "bind {{ freebsd_opensmptd_redis_bind }}"
  no_log: true
  notify: Restart redis

- name: Enable and start Redis
  ansible.builtin.service:
    name: redis
    enabled: true
    state: started

- name: Create service directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('wheel') }}"
    mode: "{{ item.mode | default('0755') }}"
  loop:
    - path: "{{ freebsd_opensmptd_letsencrypt_dir }}"
    - path: /usr/local/etc/dovecot
      mode: "0755"
    - path: /usr/local/etc/dovecot/conf.d
      mode: "0755"
    - path: "{{ freebsd_opensmptd_mail_config_dir }}"
      mode: "0755"
    - path: "{{ freebsd_opensmptd_rspamd_local_dir }}"
      mode: "0755"
    - path: "{{ freebsd_opensmptd_dkim_dir }}"
      owner: rspamd
      group: rspamd
      mode: "0750"
    - path: "{{ freebsd_opensmptd_dovecot_sieve_dir }}"
      mode: "0755"

- name: Create vmail group
  ansible.builtin.group:
    name: "{{ freebsd_opensmptd_vmail_group }}"
    system: true

- name: Create vmail user
  ansible.builtin.user:
    name: "{{ freebsd_opensmptd_vmail_user }}"
    group: "{{ freebsd_opensmptd_vmail_group }}"
    home: "{{ freebsd_opensmptd_vmail_home }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false

- name: Create vmail home
  ansible.builtin.file:
    path: "{{ freebsd_opensmptd_vmail_home }}"
    state: directory
    owner: "{{ freebsd_opensmptd_vmail_user }}"
    group: "{{ freebsd_opensmptd_vmail_group }}"
    mode: "0750"

- name: Initialize mail account files
  ansible.builtin.file:
    path: "{{ item }}"
    state: touch
    owner: root
    group: wheel
    mode: "0640"
    modification_time: preserve
    access_time: preserve
  loop:
    - /usr/local/etc/mail/passwd
    - /usr/local/etc/mail/virtuals

- name: Generate DKIM private key
  ansible.builtin.command:
    cmd: "openssl genrsa -out {{ freebsd_opensmptd_dkim_key_path }} 2048"
    creates: "{{ freebsd_opensmptd_dkim_key_path }}"
  when: freebsd_opensmptd_generate_dkim | bool
  notify: Restart rspamd

- name: Generate DKIM public key
  ansible.builtin.command:
    cmd: "openssl rsa -in {{ freebsd_opensmptd_dkim_key_path }} -pubout -out {{ freebsd_opensmptd_dkim_public_key_path }}"
    creates: "{{ freebsd_opensmptd_dkim_public_key_path }}"
  when: freebsd_opensmptd_generate_dkim | bool

- name: Set DKIM key ownership and permissions
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: rspamd
    group: rspamd
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ freebsd_opensmptd_dkim_key_path }}"
      mode: "0400"
    - path: "{{ freebsd_opensmptd_dkim_public_key_path }}"
      mode: "0440"
  when: freebsd_opensmptd_generate_dkim | bool

- name: Configure OpenSMTPD
  ansible.builtin.template:
    src: smtpd.conf.j2
    dest: /usr/local/etc/mail/smtpd.conf
    owner: root
    group: wheel
    mode: "0644"
  notify: Restart smtpd

- name: Configure rspamd local settings
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/usr/local/etc/rspamd/local.d/{{ item }}"
    owner: root
    group: wheel
    mode: "0644"
  loop:
    - redis.conf
    - spf.conf
    - dkim_signing.conf
    - phishing.conf
    - surbl.conf
    - url_reputation.conf
    - url_tags.conf
  notify: Restart rspamd

- name: Configure rspamd ClamAV integration
  ansible.builtin.template:
    src: antivirus.conf.j2
    dest: /usr/local/etc/rspamd/local.d/antivirus.conf
    owner: root
    group: wheel
    mode: "0644"
  when: freebsd_opensmptd_enable_clamav | bool
  notify: Restart rspamd

- name: Configure Dovecot managed files
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ '/usr/local/etc/dovecot/dovecot.conf' if item == 'dovecot.conf' else '/usr/local/etc/dovecot/conf.d/' ~ item }}"
    owner: root
    group: wheel
    mode: "0644"
  loop:
    - dovecot.conf
    - 10-auth.conf
    - 10-mail.conf
    - 10-ssl.conf
    - 15-mailboxes.conf
    - 20-imap.conf
    - 20-lmtp.conf
    - auth-passwdfile.conf.ext
    - 90-plugin.conf
    - 20-managesieve.conf.ext
  notify: Restart dovecot

- name: Check compiled Sieve scripts
  ansible.builtin.stat:
    path: "{{ freebsd_opensmptd_dovecot_sieve_dir }}/{{ item.bin }}"
  loop:
    - src: report-ham.sieve
      bin: report-ham.svbin
    - src: report-spam.sieve
      bin: report-spam.svbin
    - src: spam-to-folder.sieve
      bin: spam-to-folder.svbin
  register: freebsd_opensmptd_compiled_sieve_scripts

- name: Install Sieve scripts
  ansible.builtin.template:
    src: "{{ item.src }}.j2"
    dest: "{{ freebsd_opensmptd_dovecot_sieve_dir }}/{{ item.src }}"
    owner: root
    group: wheel
    mode: "0644"
  loop:
    - src: report-ham.sieve
      bin: report-ham.svbin
    - src: report-spam.sieve
      bin: report-spam.svbin
    - src: spam-to-folder.sieve
      bin: spam-to-folder.svbin
  register: freebsd_opensmptd_sieve_scripts
  notify: Restart dovecot

- name: Compile changed Sieve scripts
  ansible.builtin.command:
    cmd: "sievec {{ freebsd_opensmptd_dovecot_sieve_dir }}/{{ freebsd_opensmptd_sieve_scripts.results[item].item.src }}"
  loop: "{{ range(0, freebsd_opensmptd_sieve_scripts.results | length) | list }}"
  when: freebsd_opensmptd_sieve_scripts.results[item].changed or not freebsd_opensmptd_compiled_sieve_scripts.results[item].stat.exists
  notify: Restart dovecot

- name: Install rspamd learning helper scripts
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ freebsd_opensmptd_dovecot_sieve_dir }}/{{ item }}"
    owner: root
    group: wheel
    mode: "0755"
  loop:
    - sa-learn-ham.sh
    - sa-learn-spam.sh
  notify: Restart dovecot

- name: Create ClamAV configuration files from package samples
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    remote_src: true
    owner: root
    group: wheel
    mode: "0644"
    force: false
  loop:
    - src: /usr/local/etc/clamd.conf.sample
      dest: /usr/local/etc/clamd.conf
    - src: /usr/local/etc/freshclam.conf.sample
      dest: /usr/local/etc/freshclam.conf
  when: freebsd_opensmptd_enable_clamav | bool

- name: Update ClamAV definitions
  ansible.builtin.command:
    cmd: freshclam
    creates: /var/db/clamav/main.cvd
  when:
    - freebsd_opensmptd_enable_clamav | bool
    - freebsd_opensmptd_run_freshclam | bool

- name: Configure ClamAV TCP socket
  ansible.builtin.lineinfile:
    path: /usr/local/etc/clamd.conf
    regexp: '^#?\s*TCPSocket\s+'
    line: "TCPSocket {{ freebsd_opensmptd_clamav_tcp_socket }}"
  when: freebsd_opensmptd_enable_clamav | bool
  notify: Restart clamav clamd

- name: Validate OpenSMTPD configuration
  ansible.builtin.command:
    cmd: smtpd -n
  changed_when: false
  when: freebsd_opensmptd_validate_configs | bool

- name: Validate rspamd configuration
  ansible.builtin.command:
    cmd: rspamadm configtest
  changed_when: false
  when: freebsd_opensmptd_validate_configs | bool

- name: Validate Dovecot configuration
  ansible.builtin.command:
    cmd: doveconf -n
  changed_when: false
  when: freebsd_opensmptd_validate_configs | bool

- name: Enable and start mail services
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - rspamd
    - smtpd
    - dovecot

- name: Enable and start ClamAV services
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - clamav-freshclam
    - clamav-clamd
  when: freebsd_opensmptd_enable_clamav | bool

- name: Read DKIM public key
  ansible.builtin.slurp:
    src: "{{ freebsd_opensmptd_dkim_public_key_path }}"
  register: freebsd_opensmptd_dkim_public_key_file
  when: freebsd_opensmptd_write_dkim_dns_record | bool

- name: Write DKIM DNS record locally
  ansible.builtin.copy:
    dest: "{{ freebsd_opensmptd_dkim_dns_output_path }}"
    mode: "0600"
    content: |
      host={{ freebsd_opensmptd_dkim_selector }}._domainkey.{{ freebsd_opensmptd_domain }}

      unsplit:
      {{ freebsd_opensmptd_dkim_selector }}._domainkey.{{ freebsd_opensmptd_domain }} IN TXT "{{ freebsd_opensmptd_dkim_dns_value }}"

      split:
      {{ freebsd_opensmptd_dkim_selector }}._domainkey.{{ freebsd_opensmptd_domain }} IN TXT ( {% for chunk in freebsd_opensmptd_dkim_dns_value | regex_findall('.{1,255}') %}"{{ chunk }}"{% if not loop.last %} {% endif %}{% endfor %} )
  vars:
    freebsd_opensmptd_dkim_public_key: "{{ freebsd_opensmptd_dkim_public_key_file.content | b64decode | regex_replace('-----BEGIN PUBLIC KEY-----', '') | regex_replace('-----END PUBLIC KEY-----', '') | regex_replace('\\s+', '') }}"
    freebsd_opensmptd_dkim_dns_value: "v=DKIM1; k=rsa; p={{ freebsd_opensmptd_dkim_public_key }}"
  delegate_to: localhost
  become: false
  when: freebsd_opensmptd_write_dkim_dns_record | bool

- name: Show DKIM DNS output path
  ansible.builtin.debug:
    msg:
      - "DKIM DNS record written locally:"
      - "{{ freebsd_opensmptd_dkim_dns_output_path }}"
  when: freebsd_opensmptd_write_dkim_dns_record | bool
